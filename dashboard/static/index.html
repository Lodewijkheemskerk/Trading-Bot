<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PREDICT MKT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0b0e17;
  --bg-card: #111827;
  --bg-card-alt: #0f1524;
  --bg-hover: #1a2236;
  --border: #1e293b;
  --border-light: #2a3a52;

  --text: #e2e8f0;
  --text-secondary: #94a3b8;
  --text-dim: #475569;

  --green: #34d399;
  --green-bg: rgba(52,211,153,0.08);
  --red: #f87171;
  --red-bg: rgba(248,113,113,0.08);
  --amber: #fbbf24;
  --amber-bg: rgba(251,191,36,0.08);
  --blue: #60a5fa;
  --blue-bg: rgba(96,165,250,0.08);
  --cyan: #22d3ee;

  --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'JetBrains Mono', 'Consolas', monospace;

  --radius: 10px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html {
  font-size: 15px;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  line-height: 1.5;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── Top Bar ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 28px;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 20px;
}

.logo {
  font-family: var(--font-mono);
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 4px;
  color: var(--amber);
}

.logo-sub {
  font-size: 12px;
  color: var(--text-dim);
  letter-spacing: 0.5px;
}

.topbar-right {
  display: flex;
  align-items: center;
  gap: 24px;
}

.status-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 1px;
}

.status-active {
  background: var(--green-bg);
  border: 1px solid rgba(52,211,153,0.2);
  color: var(--green);
}

.status-active .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 2s ease infinite;
}

.status-kill {
  background: var(--red-bg);
  border: 1px solid rgba(248,113,113,0.2);
  color: var(--red);
}

.status-kill .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--red);
  animation: pulse-fast 0.6s ease infinite;
}

.mode-tag {
  padding: 5px 12px;
  border-radius: 6px;
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 1.5px;
  background: var(--amber-bg);
  border: 1px solid rgba(251,191,36,0.25);
  color: var(--amber);
}

.clock {
  font-family: var(--font-mono);
  font-size: 16px;
  font-weight: 600;
  color: var(--text-secondary);
  letter-spacing: 1px;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

@keyframes pulse-fast {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.2; }
}

/* ── Container ── */
.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* ── Stats Grid ── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}

.stat-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
}

.stat-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 6px;
}

.stat-value {
  font-family: var(--font-mono);
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.5px;
}

.stat-value.green { color: var(--green); }
.stat-value.red { color: var(--red); }
.stat-value.amber { color: var(--amber); }
.stat-value.blue { color: var(--blue); }
.stat-value.cyan { color: var(--cyan); }

/* ── Panel ── */
.panel {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}

.panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}

.panel-title {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-secondary);
}

.panel-meta {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-dim);
}

.panel-body {
  padding: 4px 0;
}

/* ── Market Cards ── */
.market-card {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 16px;
  padding: 16px 20px;
  border-bottom: 1px solid rgba(30,41,59,0.5);
  transition: background 0.15s;
}

.market-card:last-child { border-bottom: none; }
.market-card:hover { background: var(--bg-hover); }

.market-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.4;
  margin-bottom: 6px;
}

.market-meta {
  display: flex;
  gap: 16px;
  font-size: 12px;
  color: var(--text-dim);
  font-family: var(--font-mono);
}

.market-meta span {
  display: flex;
  align-items: center;
  gap: 4px;
}

.market-metrics {
  display: flex;
  align-items: center;
  gap: 20px;
  text-align: right;
}

.metric {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
}

.metric-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 2px;
}

.metric-value {
  font-family: var(--font-mono);
  font-size: 16px;
  font-weight: 600;
}

/* ── Badges ── */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 5px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.5px;
}

.badge-green { background: var(--green-bg); color: var(--green); border: 1px solid rgba(52,211,153,0.2); }
.badge-red { background: var(--red-bg); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }
.badge-amber { background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(251,191,36,0.2); }
.badge-blue { background: var(--blue-bg); color: var(--blue); border: 1px solid rgba(96,165,250,0.2); }
.badge-neutral { background: rgba(71,85,105,0.15); color: var(--text-secondary); border: 1px solid rgba(71,85,105,0.25); }

/* ── Prediction Row ── */
.pred-card {
  padding: 16px 20px;
  border-bottom: 1px solid rgba(30,41,59,0.5);
  transition: background 0.15s;
}

.pred-card:last-child { border-bottom: none; }
.pred-card:hover { background: var(--bg-hover); }

.pred-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 10px;
}

.pred-row {
  display: flex;
  align-items: center;
  gap: 24px;
  flex-wrap: wrap;
}

.pred-item {
  display: flex;
  flex-direction: column;
}

.pred-item-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 2px;
}

.pred-item-value {
  font-family: var(--font-mono);
  font-size: 15px;
  font-weight: 600;
}

/* Edge bar */
.edge-bar-bg {
  width: 80px;
  height: 6px;
  background: rgba(30,41,59,0.8);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 4px;
}

.edge-bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.4s ease;
}

/* Model breakdown */
.model-pills {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}

.model-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 6px;
  background: var(--bg-card-alt);
  border: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-secondary);
}

.model-pill .model-name {
  font-family: var(--font-mono);
  font-weight: 600;
  color: var(--text);
  font-size: 11px;
}

.model-pill .model-prob {
  font-family: var(--font-mono);
  font-weight: 600;
}

/* ── Risk Grid ── */
.risk-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  padding: 16px 20px;
}

.risk-item {
  padding: 10px 12px;
  border-radius: 8px;
  text-align: center;
  border: 1px solid var(--border);
}

.risk-item.pass {
  border-color: rgba(52,211,153,0.2);
  background: var(--green-bg);
}

.risk-item.fail {
  border-color: rgba(248,113,113,0.2);
  background: var(--red-bg);
}

.risk-name {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 4px;
}

.risk-status {
  font-family: var(--font-mono);
  font-size: 13px;
  font-weight: 700;
}

.risk-threshold {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--text-dim);
  margin-top: 2px;
}

/* ── Trade log ── */
.trade-row {
  display: grid;
  grid-template-columns: 80px 1fr 60px 80px 80px 80px 80px 90px 80px;
  align-items: center;
  gap: 8px;
  padding: 12px 20px;
  border-bottom: 1px solid rgba(30,41,59,0.5);
  font-size: 13px;
  transition: background 0.15s;
}

.trade-row:hover { background: var(--bg-hover); }
.trade-row:last-child { border-bottom: none; }

.trade-header {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-dim);
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
}

.trade-header > * { display: contents; }

.trade-id {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--blue);
}

.trade-title {
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.trade-mono {
  font-family: var(--font-mono);
  text-align: right;
  font-size: 13px;
}

/* ── Confidence bar ── */
.conf-bar-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
}

.conf-bar {
  width: 50px;
  height: 5px;
  background: rgba(30,41,59,0.8);
  border-radius: 3px;
  overflow: hidden;
}

.conf-fill {
  height: 100%;
  background: var(--amber);
  border-radius: 3px;
}

/* ── Two-col layout ── */
.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

/* ── Empty state ── */
.empty {
  padding: 32px 20px;
  text-align: center;
  color: var(--text-dim);
  font-size: 14px;
}

/* ── Anomaly indicator ── */
.anomaly {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--amber);
  box-shadow: 0 0 6px var(--amber);
  margin-right: 6px;
  vertical-align: middle;
}

/* ── Responsive ── */
@media (max-width: 1200px) {
  .two-col { grid-template-columns: 1fr; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); }
  .risk-grid { grid-template-columns: repeat(3, 1fr); }
}
</style>
</head>
<body>

<!-- ── TOP BAR ── -->
<div class="topbar">
  <div class="topbar-left">
    <div>
      <div class="logo">PREDICT MKT</div>
      <div class="logo-sub">AI Trading Terminal</div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="status-pill status-active" id="statusPill">
      <div class="dot"></div>
      <span id="statusLabel">ACTIVE</span>
    </div>
    <span class="mode-tag" id="modeTag">PAPER</span>
    <span class="clock" id="clock">--:--:--</span>
  </div>
</div>

<!-- ── MAIN CONTENT ── -->
<div class="container">

  <!-- Stats -->
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card">
      <div class="stat-label">Bankroll</div>
      <div class="stat-value cyan" id="sBankroll">--</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Open Positions</div>
      <div class="stat-value" id="sOpen">--</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total P&L</div>
      <div class="stat-value" id="sTotalPnl">--</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Win Rate</div>
      <div class="stat-value" id="sWinRate">--</div>
    </div>
  </div>

  <!-- Scanner + Research -->
  <div class="two-col">
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Market Scanner</span>
        <span class="panel-meta" id="scanMeta">--</span>
      </div>
      <div class="panel-body" id="scanBody"></div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Sentiment Research</span>
        <span class="panel-meta" id="researchMeta">--</span>
      </div>
      <div class="panel-body" id="researchBody"></div>
    </div>
  </div>

  <!-- Predictions -->
  <div class="panel">
    <div class="panel-header">
      <span class="panel-title">AI Predictions</span>
      <span class="panel-meta" id="predMeta">--</span>
    </div>
    <div class="panel-body" id="predBody"></div>
  </div>

  <!-- Risk + Trades -->
  <div class="two-col">
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Risk Checks</span>
        <span class="panel-meta">10 checks required</span>
      </div>
      <div id="riskBody"></div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Trade Log</span>
        <span class="panel-meta" id="tradeMeta">--</span>
      </div>
      <div class="panel-body" id="tradeBody"></div>
    </div>
  </div>

</div>

<script>
const fmt = (n, d=2) => n != null ? Number(n).toFixed(d) : '--';
const fmtPct = (n) => n != null ? (n * 100).toFixed(1) + '%' : '--';
const fmtUsd = (n) => n != null ? '$' + Number(n).toFixed(2) : '--';

function updateClock() {
  const d = new Date();
  document.getElementById('clock').textContent =
    d.toLocaleTimeString('en-GB', { hour12: false });
}
setInterval(updateClock, 1000);
updateClock();

async function fetchAll() {
  try {
    const [scan, research, pred, trades, portfolio, perf, kill, config] = await Promise.all([
      fetch('/api/scan').then(r => r.json()),
      fetch('/api/research').then(r => r.json()),
      fetch('/api/predictions').then(r => r.json()),
      fetch('/api/trades').then(r => r.json()),
      fetch('/api/portfolio').then(r => r.json()),
      fetch('/api/performance').then(r => r.json()),
      fetch('/api/kill_switch').then(r => r.json()),
      fetch('/api/config').then(r => r.json()),
    ]);

    renderStatus(kill);
    renderMode(config);
    renderStats(portfolio, perf);
    renderScan(scan);
    renderResearch(research);
    renderPredictions(pred);
    renderRisk(pred, config);
    renderTrades(trades);
  } catch(e) { console.error('Fetch error:', e); }
}

function renderStatus(kill) {
  const pill = document.getElementById('statusPill');
  const label = document.getElementById('statusLabel');
  if (kill.active) {
    pill.className = 'status-pill status-kill';
    label.textContent = 'KILL SWITCH';
  } else {
    pill.className = 'status-pill status-active';
    label.textContent = 'ACTIVE';
  }
}

function renderMode(config) {
  document.getElementById('modeTag').textContent = (config.mode || 'paper').toUpperCase();
}

function renderStats(port, perf) {
  document.getElementById('sBankroll').textContent = fmtUsd(port.current_bankroll);

  const open = document.getElementById('sOpen');
  open.textContent = port.open_positions || 0;
  open.className = 'stat-value' + (port.open_positions > 0 ? ' blue' : '');

  const pnl = document.getElementById('sTotalPnl');
  pnl.textContent = fmtUsd(perf.total_pnl);
  pnl.className = 'stat-value ' + (perf.total_pnl > 0 ? 'green' : perf.total_pnl < 0 ? 'red' : '');

  const wr = document.getElementById('sWinRate');
  wr.textContent = fmtPct(perf.win_rate);
  wr.className = 'stat-value ' + (perf.win_rate >= 0.6 ? 'green' : perf.win_rate > 0 ? 'amber' : '');
}

function renderScan(data) {
  const markets = data.markets || [];
  const el = document.getElementById('scanBody');
  document.getElementById('scanMeta').textContent =
    markets.length + ' of 4,458 passed';

  if (!markets.length) {
    el.innerHTML = '<div class="empty">No markets match scanner criteria</div>';
    return;
  }

  el.innerHTML = markets.map(m => `
    <div class="market-card">
      <div>
        <div class="market-title">${m.is_anomaly ? '<span class="anomaly"></span>' : ''}${m.title}</div>
        <div class="market-meta">
          <span>Vol: ${Math.round(m.volume_24h)}</span>
          <span>Spread: ${fmt(m.spread, 3)}</span>
          <span>${m.days_to_expiry}d left</span>
        </div>
      </div>
      <div class="market-metrics">
        <div class="metric">
          <div class="metric-label">YES Price</div>
          <div class="metric-value" style="color:var(--cyan)">${fmt(m.yes_price)}</div>
        </div>
        <div class="metric">
          <div class="metric-label">Score</div>
          <div class="metric-value" style="color:var(--amber)">${fmt(m.opportunity_score, 1)}</div>
        </div>
      </div>
    </div>
  `).join('');
}

function renderResearch(data) {
  const briefs = data.briefs || [];
  const el = document.getElementById('researchBody');
  document.getElementById('researchMeta').textContent = briefs.length + ' analyzed';

  if (!briefs.length) {
    el.innerHTML = '<div class="empty">No research briefs yet</div>';
    return;
  }

  el.innerHTML = briefs.map(b => {
    const sentClass = b.consensus_sentiment === 'bullish' ? 'badge-green' :
                      b.consensus_sentiment === 'bearish' ? 'badge-red' : 'badge-neutral';
    const gapClass = b.gap > 0 ? 'badge-green' : b.gap < 0 ? 'badge-red' : 'badge-neutral';
    return `
    <div class="market-card">
      <div>
        <div class="market-title">${b.market_title}</div>
        <div style="display:flex;gap:8px;align-items:center;margin-top:4px;">
          <span class="badge ${sentClass}">${b.consensus_sentiment}</span>
          <div class="conf-bar-wrap">
            <div class="conf-bar"><div class="conf-fill" style="width:${b.consensus_confidence*100}%"></div></div>
            <span style="font-family:var(--font-mono);font-size:12px;color:var(--text-secondary)">${fmtPct(b.consensus_confidence)}</span>
          </div>
        </div>
      </div>
      <div class="market-metrics">
        <div class="metric">
          <div class="metric-label">Implied</div>
          <div class="metric-value">${fmt(b.sentiment_implied_probability)}</div>
        </div>
        <div class="metric">
          <div class="metric-label">Gap</div>
          <div class="metric-value" style="color:${b.gap > 0 ? 'var(--green)' : b.gap < 0 ? 'var(--red)' : 'var(--text-secondary)'}">
            ${b.gap > 0 ? '+' : ''}${fmtPct(b.gap)}
          </div>
        </div>
      </div>
    </div>
  `}).join('');
}

function renderPredictions(data) {
  const signals = data.signals || [];
  const el = document.getElementById('predBody');
  document.getElementById('predMeta').textContent =
    signals.filter(s => s.should_trade).length + '/' + signals.length + ' tradeable';

  if (!signals.length) {
    el.innerHTML = '<div class="empty">No predictions yet — run the pipeline</div>';
    return;
  }

  el.innerHTML = signals.map(s => {
    const edgePct = Math.min(Math.abs(s.edge) / 0.25 * 100, 100);
    const edgeColor = s.edge > 0 ? 'var(--green)' : 'var(--red)';
    const tradeClass = s.should_trade ? 'badge-green' : 'badge-neutral';
    const tradeLabel = s.should_trade ? 'TRADE' : 'SKIP';

    // Model breakdown pills
    const models = (s.model_predictions || []).map(mp => {
      const color = mp.model_name === 'claude' ? 'var(--cyan)' :
                    mp.model_name === 'gpt4o' ? 'var(--green)' : 'var(--amber)';
      return `<div class="model-pill">
        <span class="model-name">${mp.model_name}</span>
        <span class="model-prob" style="color:${color}">${fmt(mp.predicted_probability, 2)}</span>
        <span style="color:var(--text-dim)">${(mp.weight*100).toFixed(0)}%</span>
      </div>`;
    }).join('');

    return `
    <div class="pred-card">
      <div class="pred-title">${s.market_title}</div>
      <div class="pred-row">
        <div class="pred-item">
          <div class="pred-item-label">Ensemble</div>
          <div class="pred-item-value" style="color:var(--cyan)">${fmt(s.ensemble_probability, 3)}</div>
        </div>
        <div class="pred-item">
          <div class="pred-item-label">Market</div>
          <div class="pred-item-value">${fmt(s.market_probability, 3)}</div>
        </div>
        <div class="pred-item">
          <div class="pred-item-label">Edge</div>
          <div class="pred-item-value" style="color:${edgeColor}">
            ${s.edge > 0 ? '+' : ''}${fmt(s.edge, 3)}
          </div>
          <div class="edge-bar-bg"><div class="edge-bar-fill" style="width:${edgePct}%;background:${edgeColor}"></div></div>
        </div>
        <div class="pred-item">
          <div class="pred-item-label">Direction</div>
          <div class="pred-item-value" style="color:${s.direction === 'buy_yes' ? 'var(--green)' : 'var(--red)'}">
            ${s.direction === 'buy_yes' ? 'BUY YES' : 'BUY NO'}
          </div>
        </div>
        <div class="pred-item">
          <div class="pred-item-label">Confidence</div>
          <div class="pred-item-value" style="color:var(--amber)">${fmtPct(s.confidence)}</div>
        </div>
        <div class="pred-item">
          <div class="pred-item-label">Signal</div>
          <span class="badge ${tradeClass}">${tradeLabel}</span>
        </div>
      </div>
      <div class="model-pills">${models}</div>
    </div>
  `}).join('');
}

function renderRisk(pred, config) {
  const riskCfg = config.risk || {};
  const predCfg = config.prediction || {};
  const signals = pred.signals || [];
  const hasSignals = signals.length > 0;
  const first = signals[0] || {};

  const checks = [
    { name: 'Min Edge', threshold: '>'+predCfg.min_edge, pass: Math.abs(first.edge||0) >= (predCfg.min_edge||0.04) },
    { name: 'Min Conf', threshold: '>'+predCfg.min_confidence, pass: (first.confidence||0) >= (predCfg.min_confidence||0.65) },
    { name: 'Max Position', threshold: fmtPct(riskCfg.max_position_pct), pass: true },
    { name: 'Max Open', threshold: riskCfg.max_concurrent_positions, pass: true },
    { name: 'Daily Loss', threshold: fmtPct(riskCfg.max_daily_loss_pct), pass: true },
    { name: 'Drawdown', threshold: fmtPct(riskCfg.max_drawdown_pct), pass: true },
    { name: 'Kill Switch', threshold: 'OFF', pass: true },
    { name: 'Slippage', threshold: fmtPct(riskCfg.max_slippage_pct), pass: true },
    { name: 'Bankroll', threshold: '> $0', pass: true },
    { name: 'API Cost', threshold: '$'+riskCfg.max_daily_api_cost, pass: true },
  ];

  document.getElementById('riskBody').innerHTML = `
    <div class="risk-grid">
      ${checks.map(c => `
        <div class="risk-item ${hasSignals ? (c.pass ? 'pass' : 'fail') : ''}">
          <div class="risk-name">${c.name}</div>
          <div class="risk-status" style="color:${hasSignals ? (c.pass ? 'var(--green)' : 'var(--red)') : 'var(--text-dim)'}">
            ${hasSignals ? (c.pass ? 'PASS' : 'FAIL') : '--'}
          </div>
          <div class="risk-threshold">${c.threshold}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderTrades(data) {
  const trades = data.trades || [];
  const el = document.getElementById('tradeBody');
  document.getElementById('tradeMeta').textContent =
    trades.filter(t => t.risk_passed).length + ' executed, ' +
    trades.filter(t => !t.risk_passed).length + ' blocked';

  const executed = trades.filter(t => t.risk_passed || t.status === 'open');

  if (!executed.length) {
    el.innerHTML = '<div class="empty">No trades executed yet</div>';
    return;
  }

  el.innerHTML = executed.map(t => {
    const statusClass = t.status === 'open' ? 'badge-blue' :
                        t.status === 'closed' ? 'badge-green' : 'badge-neutral';
    return `
    <div class="market-card">
      <div>
        <div class="market-title">${t.market_title}</div>
        <div class="market-meta">
          <span class="trade-id">${(t.trade_id||'').slice(0,8)}</span>
          <span style="color:${t.direction === 'buy_yes' ? 'var(--green)' : 'var(--red)'}">
            ${t.direction === 'buy_yes' ? 'BUY YES' : 'BUY NO'}
          </span>
          <span>Entry: ${fmt(t.entry_price, 3)}</span>
          <span>Size: ${fmtUsd(t.position_size_usd)}</span>
          <span>Kelly: ${fmt(t.kelly_fraction, 3)}</span>
        </div>
      </div>
      <div class="market-metrics">
        <div class="metric">
          <div class="metric-label">Edge</div>
          <div class="metric-value" style="color:var(--green)">${t.edge > 0 ? '+' : ''}${fmt(t.edge, 3)}</div>
        </div>
        <div class="metric">
          <div class="metric-label">P&L</div>
          <div class="metric-value" style="color:${t.pnl > 0 ? 'var(--green)' : t.pnl < 0 ? 'var(--red)' : 'var(--text-secondary)'}">
            ${fmtUsd(t.pnl)}
          </div>
        </div>
        <div class="metric">
          <div class="metric-label">Status</div>
          <span class="badge ${statusClass}">${t.status}</span>
        </div>
      </div>
    </div>
  `}).join('');
}

fetchAll();
setInterval(fetchAll, 15000);
</script>
</body>
</html>
