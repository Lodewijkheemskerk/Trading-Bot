bot_name: predict-market-bot
mode: paper
log_level: INFO
bankroll:
  initial: 500.0
  currency: USD
scanner:
  schedule_minutes: 30
  min_volume: 200
  max_days_to_expiry: 30
  min_liquidity: 0
  anomaly_price_move: 0.1
  anomaly_spread: 0.05
  volume_spike_multiplier: 2.0
  skip_categories:
  - KXMVE
  - KXNBA
  - KXNFL
  - KXMLB
  - KXNHL
  max_pages: 10
research:
  sources:
  - google_news_rss
  - bing_news_rss
  - reddit
  max_articles_per_source: 20
  sentiment_threshold: 0.6
  parallel_workers: 3
  x_search:
    enabled: false
    top_n: 5
    max_results: 10
prediction:
  min_edge: 0.04
  min_confidence: 0.65
  ensemble_models:
  - name: grok
    role: primary_forecaster
    weight: 0.3
    model_id: grok-3-fast
  - name: claude
    role: news_analyst
    weight: 0.2
    model_id: claude-sonnet-4-20250514
  - name: gpt4o
    role: bull_advocate
    weight: 0.2
    model_id: gpt-4o-mini
  - name: gemini
    role: bear_advocate
    weight: 0.15
    model_id: gemini-2.5-flash
  - name: deepseek
    role: risk_manager
    weight: 0.15
    model_id: deepseek-chat
  - name: xgboost
    role: statistical_calibrator
    weight: 0
  brier_score_max: 0.25
risk:
  kelly_fraction: 0.25
  max_position_pct: 0.05
  max_concurrent_positions: 15
  max_daily_loss_pct: 0.15
  max_drawdown_pct: 0.08
  max_slippage_pct: 0.02
  var_confidence: 0.95
  max_var_pct: 0.1
  max_total_exposure_pct: 0.4
  max_daily_api_cost: 50.0
execution:
  order_type: limit
  retry_attempts: 3
  retry_delay_seconds: 5
  kill_switch_file: STOP
compound:
  nightly_review_hour: 23
  min_trades_for_stats: 10
  post_mortem:
    enabled: true
    models:
    - name: gpt4o_mini
      model_id: gpt-4o-mini
      env_key: OPENAI_API_KEY
      provider: openai
    - name: deepseek
      model_id: deepseek-chat
      env_key: DEEPSEEK_API_KEY
      provider: openai_compatible
      base_url: https://api.deepseek.com
  performance_targets:
    win_rate: 0.6
    sharpe_ratio: 2.0
    max_drawdown: 0.08
    profit_factor: 1.5
    brier_score: 0.25
position_monitor:
  stop_loss_pct: 0.15
  take_profit_pct: 0.2
  max_hold_hours: 240
  emergency_stop_pct: 0.1
  edge_floor: 0.0
trading_hours:
  maintenance_blackout: true
  blackout_day: 3
  blackout_start_hour: 3
  blackout_end_hour: 5
  blackout_timezone: America/New_York
kalshi:
  production_url: https://api.elections.kalshi.com/trade-api/v2
  demo_url: https://demo-api.kalshi.co/trade-api/v2
  base_url: https://api.elections.kalshi.com/trade-api/v2
